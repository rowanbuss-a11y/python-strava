name: Strava sync

on:
  schedule:
    - cron: "*/30 * * * *"  # Elke 30 minuten — nieuwe activiteiten binnen 30 min zichtbaar
  workflow_dispatch: {}      # Handmatig starten blijft mogelijk

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-supabase-requests
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase requests

      - name: Run Strava sync
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          CSV_FILE:             activiteiten.csv
          JSON_FILE:            activiteiten_raw.json
          DAYS_BACK:            "9999"
        run: python strava_sync.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: strava-output
          path: |
            activiteiten.csv
            activiteiten_raw.json
          retention-days: 3
